<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Ticket | Tachikoma Dashboard</title>
    <style>
      :root { --bg:#0a0a0a; --card:#111; --border:#2a2a2a; --text:#fafafa; --subtle:#a1a1aa; --radius:12px; }
      *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text)}
      .app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}
      .sidebar{border-right:1px solid var(--border);padding:20px 14px}
      .brand{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);margin-bottom:18px;font-weight:700}
      .menu{display:grid;gap:6px}.menu a{color:var(--text);text-decoration:none;padding:10px 12px;border-radius:10px;font-size:14px}.menu a.active{background:var(--card);border:1px solid var(--border)}
      .main{padding:24px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
      .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      label{display:block;font-size:12px;color:var(--subtle)} input,select,textarea{width:100%;margin-top:6px;background:#0f0f0f;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;font:inherit}
      textarea{min-height:120px}.full{grid-column:1/-1}
      .actions{display:flex;gap:10px;align-items:center;margin-top:12px}
      .btn{background:#fafafa;color:#111;padding:9px 12px;border-radius:10px;border:0;font-weight:700;cursor:pointer}
      .danger{background:#991b1b;color:#fff}.muted{font-size:12px;color:var(--subtle)}
      @media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{display:none}.grid{grid-template-columns:1fr}.main{padding:12px}}
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">dashboard</div>
        <nav class="menu"><a href="/">🏠 Dashboard</a><a href="/projects.html">📁 Projects</a><a class="active" href="/tickets.html">🎫 Tickets</a><a href="/board.html">🧩 Board</a><a href="/design-system.html">🎨 DesighSystem</a></nav>
      </aside>
      <main class="main">
        <div class="head"><div><h1 style="margin:0">Edit Ticket</h1><div class="muted">既存情報を編集</div></div><a href="/tickets.html" class="muted">← Back</a></div>
        <section class="card">
          <div class="grid">
            <label>Ticket No<input id="ticket_no" /></label>
            <label>Title<input id="title" /></label>
            <label>Status<select id="status"><option value="backlog">backlog</option><option value="todo">todo</option><option value="spec_review">spec_review</option><option value="in_progress">in_progress</option><option value="review">review</option><option value="blocked">blocked</option><option value="qa_blocked">qa_blocked</option><option value="done">done</option></select></label>
            <label>Ticket Type<select id="ticket_type"><option value="Marketing">Marketing</option><option value="Develop">Develop</option><option value="OtherTask">OtherTask</option></select></label>
            <label>Assignee<select id="assignee_id"></select></label>
            <label>Due Date<input id="due_date" type="date" /></label>
            <label class="full">チケット概要<textarea id="description"></textarea></label>
            <label class="full">完了条件<textarea id="completion_criteria"></textarea></label>
            <label class="full">設計<textarea id="design"></textarea></label>
            <label class="full">仕様<textarea id="specification"></textarea></label>
            <label>Working Branch<input id="working_branch" /></label>
            <label>PR URL<input id="pr_url" /></label>
            <label class="full">ファイル添付<input id="ticket_files" type="file" multiple accept=".png,.jpg,.jpeg,.webp,.pdf,.md,.doc,.docx,.txt" /></label>
          </div>
          <div class="actions"><button id="saveBtn" class="btn">Save</button><button id="deleteBtn" class="btn danger">Delete Ticket</button><span id="state" class="muted">state: loading...</span></div>
        </section>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/dashboard-db.js"></script>
    <script>
      const qp = new URLSearchParams(location.search);
      const ticketId = qp.get('ticket_id') || localStorage.getItem('LAST_TICKET_ID') || '';
      const state = document.getElementById('state');
      let originalStatus = null;
      let originalProjectId = null;
      async function init(){
        if(!ticketId){ state.textContent='state: ticket_id missing'; return; }
        const [t, users] = await Promise.all([window.DashboardDB.fetchTicketById(ticketId), window.DashboardDB.fetchUsers()]);
        if(!t){ state.textContent='state: ticket not found'; return; }
        const us = document.getElementById('assignee_id');
        us.innerHTML = '<option value="">(none)</option>' + users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
        document.getElementById('ticket_no').value = t.ticket_no || '';
        document.getElementById('title').value = t.title || '';
        document.getElementById('status').value = t.status || 'backlog';
        document.getElementById('ticket_type').value = t.ticket_type || 'OtherTask';
        document.getElementById('due_date').value = t.due_date || '';
        document.getElementById('assignee_id').value = t.assignee_id || '';
        document.getElementById('description').value = t.description || '';
        document.getElementById('completion_criteria').value = t.completion_criteria || '';
        document.getElementById('design').value = t.design || '';
        document.getElementById('specification').value = t.specification || '';
        document.getElementById('working_branch').value = t.working_branch || '';
        document.getElementById('pr_url').value = t.pr_url || '';
        originalStatus = t.status || null;
        originalProjectId = t.project_id || null;
        state.textContent='state: ready';
      }
      init().catch(e=>state.textContent=`state: init error / ${e.message}`);

      document.getElementById('saveBtn').onclick = async()=>{
        const payload = {
          ticketId,
          ticketNo: document.getElementById('ticket_no').value.trim(),
          title: document.getElementById('title').value.trim(),
          status: document.getElementById('status').value,
          ticketType: document.getElementById('ticket_type').value || 'OtherTask',
          dueDate: document.getElementById('due_date').value || null,
          assigneeId: document.getElementById('assignee_id').value || null,
          description: document.getElementById('description').value.trim() || null,
          completionCriteria: document.getElementById('completion_criteria').value.trim() || null,
          design: document.getElementById('design').value.trim() || null,
          specification: document.getElementById('specification').value.trim() || null,
          workingBranch: document.getElementById('working_branch').value.trim() || null,
          prUrl: document.getElementById('pr_url').value.trim() || null,
        };
        if(!payload.title){ state.textContent='state: title required'; return; }
        state.textContent='state: saving...';
        try{
          const saved = await window.DashboardDB.updateTicket(payload);
          const files = [...(document.getElementById('ticket_files').files || [])];
          for (const f of files) {
            const contentBase64 = await new Promise((resolve, reject) => {
              const r = new FileReader();
              r.onload = () => resolve(String(r.result || '').split(',')[1] || '');
              r.onerror = () => reject(new Error('file read error'));
              r.readAsDataURL(f);
            });
            await window.DashboardDB.insertTicketAttachment({ ticketId, fileName: f.name, mimeType: f.type || null, fileSize: f.size || null, contentBase64, createdBy: null });
          }
          state.textContent='state: saved'; location.href='/tickets.html';
        }
        catch(e){ state.textContent=`state: save error / ${e.message}`; }
      };

      document.getElementById('deleteBtn').onclick = async()=>{
        if(!confirm('このチケットを削除します')) return;
        state.textContent='state: deleting...';
        try{ await window.DashboardDB.deleteTicket({ ticketId }); state.textContent='state: deleted'; location.href='/tickets.html'; }
        catch(e){ state.textContent=`state: delete error / ${e.message}`; }
      };
    </script>
  </body>
</html>
