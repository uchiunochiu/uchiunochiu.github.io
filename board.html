<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board | Tachikoma Dashboard</title>
    <style>
      :root { --bg:#0a0a0a; --card:#111; --muted:#1c1c1c; --border:#2a2a2a; --text:#fafafa; --subtle:#a1a1aa; --radius:12px; }
      *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text)}
      .app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}
      .sidebar{border-right:1px solid var(--border);padding:20px 14px}
      .brand{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);margin-bottom:18px;font-weight:700}
      .menu{display:grid;gap:6px}.menu a{color:var(--text);text-decoration:none;padding:10px 12px;border-radius:10px;font-size:14px;display:flex;align-items:center;gap:8px;white-space:nowrap}.menu a.active{background:var(--card);border:1px solid var(--border)}
      .main{padding:24px}
      .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
      .hint{font-size:12px;color:var(--subtle);border:1px solid var(--border);padding:7px 10px;border-radius:999px;background:var(--muted)}
      .status{font-size:12px;color:var(--subtle);margin-bottom:10px}
      .project-section{margin-top:14px;border:1px solid var(--border);border-radius:14px;background:var(--card);padding:12px}
      .project-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
      .project-title{font-size:16px;font-weight:700}.project-meta{font-size:12px;color:var(--subtle)}
      .columns{display:grid;grid-template-columns:repeat(8,minmax(180px,1fr));gap:10px;overflow-x:auto}
      .col{border:1px dashed var(--border);border-radius:12px;background:#0d0d0d;padding:10px;min-height:150px}
      .col h4{margin:0 0 10px;font-size:12px;color:var(--subtle)}
      .ticket{background:var(--muted);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
      .ticket b{font-size:12px;display:block;margin-bottom:4px}
      .meta{font-size:11px;color:var(--subtle)}
      .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
      .btn{background:#202020;color:#fafafa;border:1px solid var(--border);border-radius:8px;padding:4px 6px;font-size:11px;cursor:pointer}
      @media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{display:none}.main{padding:12px}}
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">dashboard</div>
        <nav class="menu">
          <a href="/">🏠 Dashboard</a>
          <a href="/projects.html">📁 Projects</a>
          <a href="/tickets.html">🎫 Tickets</a>
          <a class="active" href="/board.html">🧩 Board</a>
          <a href="#">🗓️ Calendar</a>
          <a href="#">⚙️ Settings</a>
        </nav>
      </aside>

      <main class="main">
        <div class="head">
          <div>
            <h1 style="margin:0">Board</h1>
            <div style="color:var(--subtle);font-size:14px">プロジェクト別にチケットを動的表示</div>
          </div>
          <span class="hint">ステータス変更は即反映</span>
        </div>
        <div id="boardStatus" class="status">state: loading...</div>
        <div id="boardRoot"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/dashboard-db.js"></script>
    <script>
      const boardRoot = document.getElementById('boardRoot');
      const boardStatus = document.getElementById('boardStatus');
      const qp = new URLSearchParams(location.search);
      const PROJECT_ID_FILTER = qp.get('project_id') || '';
      const COLS = ['backlog','todo','spec_review','in_progress','review','blocked','qa_blocked','done'];
      const LABEL = {backlog:'Backlog',todo:'Todo',spec_review:'Spec Review',in_progress:'In Progress',review:'Review',blocked:'Blocked',qa_blocked:'Q&A Blocked',done:'Done'};

      function nextStates(current){
        return COLS.filter(s=>s!==current).slice(0,3);
      }

      async function moveTicket(ticketId, status){
        try {
          await window.DashboardDB.updateTicketStatus({ticketId, status});
          await loadBoard();
        } catch (e) {
          boardStatus.textContent = `state: status update error / ${e.message}`;
        }
      }

      function ticketHtml(t){
        const actions = nextStates(t.status).map(s=>`<button class="btn" data-id="${t.id}" data-status="${s}">→ ${LABEL[s]}</button>`).join('');
        return `<div class="ticket"><b><a href="/ticket-detail.html?ticket_id=${t.id}" style="color:#fafafa">${t.ticket_no || t.id.slice(0,8)} ${t.title}</a></b><div class="meta">due: ${t.due_date || '-'}</div><div class="actions">${actions}</div></div>`;
      }

      function sectionHtml(project, tickets){
        const by = Object.fromEntries(COLS.map(c=>[c,[]]));
        tickets.forEach(t=>{(by[t.status]||by.backlog).push(t)});
        const cols = COLS.map(c=>`<section class="col"><h4>${LABEL[c]}</h4>${by[c].map(ticketHtml).join('') || '<div class="meta">（空）</div>'}</section>`).join('');
        return `<section class="project-section"><div class="project-header"><div><div class="project-title">${project.title}</div><div class="project-meta">${project.project_key || project.id.slice(0,8)} / ${tickets.length} tickets</div></div></div><div class="columns">${cols}</div></section>`;
      }


      async function loadBoard(){
        boardStatus.textContent = 'state: loading...';
        try {
          const projects = await window.DashboardDB.fetchProjects(200);
          const tickets = await window.DashboardDB.fetchTickets({limit: 1000});
          const byProject = new Map();
          tickets.forEach(t=>{const k=t.project_id; if(!byProject.has(k)) byProject.set(k,[]); byProject.get(k).push(t)});
          const filteredProjects = PROJECT_ID_FILTER ? projects.filter((p) => String(p.id) === String(PROJECT_ID_FILTER)) : projects;
          const html = filteredProjects.map(p=>{
            const own = tickets.filter(t=>{
              const pid = String(t.project_id || '').trim();
              return pid && t.status && (pid === String(p.id) || pid === String(p.project_key || '') || pid === String(p.title || ''));
            });
            return sectionHtml(p, own);
          }).join('');
          boardRoot.innerHTML = html || '<div class="meta">projectがありません</div>';
          boardStatus.textContent = `state: loaded ${filteredProjects.length} projects / ${tickets.length} tickets${PROJECT_ID_FILTER ? ' (project filter ON)' : ''}`;
          boardRoot.querySelectorAll('button[data-id][data-status]').forEach(btn=>{
            btn.addEventListener('click',()=>moveTicket(btn.dataset.id, btn.dataset.status));
          });
        } catch (e) {
          boardStatus.textContent = `state: error / ${e.message}`;
        }
      }

      loadBoard();
    </script>
  </body>
</html>
