<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tickets | Tachikoma Dashboard</title>
    <style>
      :root { --bg:#0a0a0a; --card:#111; --muted:#1c1c1c; --border:#2a2a2a; --text:#fafafa; --subtle:#a1a1aa; --radius:12px; }
      *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text)}
      .app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}
      .sidebar{border-right:1px solid var(--border);padding:20px 14px}
      .brand{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);margin-bottom:18px;font-weight:700}
      .menu{display:grid;gap:6px}.menu a{color:var(--text);text-decoration:none;padding:10px 12px;border-radius:10px;font-size:14px;display:flex;align-items:center;gap:8px;white-space:nowrap}.menu a.active{background:var(--card);border:1px solid var(--border)}
      .main{padding:24px}
      .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
      .filters{display:flex;gap:8px;flex-wrap:wrap}
      .chip{border:1px solid var(--border);padding:7px 10px;border-radius:999px;font-size:12px;background:var(--muted)}
      .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
      table{width:100%;border-collapse:collapse;font-size:13px} th,td{padding:10px 6px;border-bottom:1px solid var(--border);text-align:left}
      th{font-size:12px;color:var(--subtle)}
      .badge{padding:3px 8px;border-radius:999px;font-size:11px;border:1px solid var(--border)}
      .backlog{background:#27272a}.todo{background:#1f2937}.progress{background:#1e3a8a}.review{background:#4c1d95}.blocked{background:#7f1d1d}.done{background:#14532d}
      .btn{background:#fafafa;color:#111;padding:9px 12px;border-radius:10px;border:0;font-weight:700}
      .actor{display:inline-flex;align-items:center;gap:6px}
      .actor img{width:18px;height:18px;border-radius:999px;object-fit:cover;border:1px solid var(--border)}
      @media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border)}.menu{display:flex;overflow:auto;gap:6px}.menu a{font-size:13px;padding:8px 10px}.main{padding:0 0 12px}.card{padding:12px}.columns{grid-template-columns:repeat(6,minmax(150px,1fr))}.table-wrap{overflow:auto}.card{border-radius:0;border-left:none;border-right:none}.head,.toolbar,.top{padding:0 12px}.row,.layout,.grid{padding:0 0}}
    
      /* mobile full-width unification */
      @media (max-width: 980px) {
        html, body, .app, .main, main { width: 100% !important; max-width: 100% !important; overflow-x: auto !important; }
        .main { padding: 0 0 12px !important; }
        .card { border-radius: 0 !important; border-left: none !important; border-right: none !important; margin-left: 0 !important; margin-right: 0 !important; }
        .top, .toolbar, .head { padding: 0 12px !important; }
        .row, .layout, .grid { gap: 10px !important; }
        .columns { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
        table { display: block; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .mobile-topbar{display:flex}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;transform:translateX(-105%);transition:transform .2s ease;z-index:50;background:var(--bg);border-right:1px solid var(--border)}
        .sidebar.open{transform:translateX(0)}
        .sidebar .menu{display:grid !important;grid-auto-flow:row !important;gap:6px !important;overflow:visible !important}
        .sidebar .menu a{width:100% !important;justify-content:flex-start !important}
      }

    
      .mobile-topbar{display:none;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:30}
      .hamburger{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:16px}
      .drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40}
      .drawer-backdrop.open{display:block}
      .hamburger-fab{display:none;position:fixed;top:12px;left:12px;z-index:70;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 10px;font-size:16px;line-height:1}
      @media (max-width:980px){.hamburger-fab{display:block !important}.main{padding-top:56px !important}.mobile-topbar{display:none !important}}

    </style>
  </head>
  <body>
    <button id="hamburgerFab" class="hamburger-fab" aria-label="menu">☰</button>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">dashboard</div>
        <nav class="menu">
          <a href="/">🏠 Dashboard</a>
          <a href="/projects.html">📁 Projects</a>
          <a class="active" href="/tickets.html">🎫 Tickets</a>
          <a href="/board.html">🧩 Board</a>
          <a href="/research-reports.html">📊 ResearchReport</a>
          <a href="/design-system.html">🎨 DesighSystem</a>
          <a href="#">🗓️ Calendar</a>
          <a href="#">⚙️ Settings</a>
        </nav>
      </aside>
      <div class="drawer-backdrop" id="drawerBackdrop"></div>
      <main class="main">
        <div class="mobile-topbar"><strong>dashboard</strong><button id="hamburgerBtn" class="hamburger">☰</button></div>
        <div class="toolbar">
          <div>
            <h1 style="margin:0">🎫 Tickets</h1>
            <div style="color:var(--subtle);font-size:14px">全チケット一覧（プロジェクト横断）</div>
          </div>

        </div>
        <div class="filters">
          <span class="chip">Project: All</span><span class="chip">Assignee: All</span><span class="chip">Status: Active</span>
        </div>
        <div id="ticketStatus" style="font-size:12px;color:var(--subtle);margin-top:8px">state: idle</div>
        <div id="ticketDiag" style="font-size:11px;color:#fca5a5;margin-top:4px;white-space:pre-wrap"></div>
        <section class="card" style="margin-top:12px">
          <table>
            <thead><tr><th>ID</th><th>Project</th><th>Title</th><th>Assignee</th><th>Status</th><th>Due</th></tr></thead>
            <tbody id="ticketRows"></tbody>
          </table>
        </section>

      </main>
    </div>
  
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/dashboard-db.js"></script>
    <script>
      const MAJOR_USER_ID = '00000000-0000-0000-0000-0000000000aa'; // replace
      const ticketRows = document.getElementById('ticketRows');
      const ticketStatus = document.getElementById('ticketStatus');
      const newTicketBtn = document.getElementById('newTicketBtn');
      const usersById = new Map();
      const ticketDiag = document.getElementById('ticketDiag');

      function statusClass(status) {
        const m = { backlog: 'backlog', todo: 'todo', spec_review: 'review', in_progress: 'progress', review: 'review', blocked: 'blocked', qa_blocked: 'blocked', done: 'done' };
        return m[status] || 'todo';
      }
      function statusLabel(status) {
        const m = { backlog:'Backlog', todo:'Todo', spec_review:'Spec Review', in_progress:'In Progress', review:'Review', blocked:'Blocked', qa_blocked:'Q&A Blocked', done:'Done' };
        return m[status] || status;
      }

      function renderTickets(rows) {
        ticketRows.innerHTML = '';
        if (!rows.length) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td colspan="6" style="color:#a1a1aa">0件です。<a href="/setup.html#diag" style="color:#fafafa">/setup.html#diag</a> で接続状態を確認してください。</td>`;
          ticketRows.appendChild(tr);
          return;
        }

        const byId = new Map(rows.map((r) => [r.id, r]));
        const childrenByParent = new Map();
        rows.forEach((r) => {
          if (!r.parent_ticket_id) return;
          const arr = childrenByParent.get(r.parent_ticket_id) || [];
          arr.push(r);
          childrenByParent.set(r.parent_ticket_id, arr);
        });

        const orderChildren = (arr) => [...arr].sort((a, b) => {
          const ao = Number.isFinite(Number(a.sort_order)) ? Number(a.sort_order) : Number.MAX_SAFE_INTEGER;
          const bo = Number.isFinite(Number(b.sort_order)) ? Number(b.sort_order) : Number.MAX_SAFE_INTEGER;
          if (ao !== bo) return ao - bo;
          return String(b.created_at || '').localeCompare(String(a.created_at || ''));
        });

        const parents = rows.filter((r) => !r.parent_ticket_id);
        const orphanChildren = rows.filter((r) => r.parent_ticket_id && !byId.has(r.parent_ticket_id));
        const ordered = [];

        const addRow = (t, opts = {}) => {
          ordered.push({ ...t, __isChild: !!opts.isChild, __treePrefix: opts.treePrefix || '', __isParent: !!opts.isParent });
        };

        parents.forEach((p) => {
          const kids = orderChildren(childrenByParent.get(p.id) || []);
          addRow(p, { isParent: kids.length > 0 });
          kids.forEach((k, idx) => addRow(k, { isChild: true, treePrefix: idx === kids.length - 1 ? '┗' : '┣' }));
        });
        orderChildren(orphanChildren).forEach((k) => addRow(k, { isChild: true, treePrefix: '┗' }));

        ordered.forEach((t) => {
          const projectName = t.projects?.title || '-';
          const due = t.due_date || '-';
          const u = usersById.get(t.assignee_id);
          const assignee = u ? `<span class="actor">${u.icon ? `<img src="${u.icon}" alt="u"/>` : ''}${u.name}</span>` : '-';
          const icon = t.__isChild ? '🐥' : (t.__isParent ? '🐓' : '');
          const idText = `${icon}${t.ticket_no || t.id.slice(0,8)}`;
          const titleText = `${t.__isChild ? `${t.__treePrefix}` : ''}${t.title}`;
          const titleStyle = t.__isChild ? 'style="padding-left:8px"' : '';
          const tr = document.createElement('tr');
          tr.innerHTML = `<td><a href="/ticket-detail.html?ticket_id=${t.id}" style="color:#fafafa">${idText}</a></td><td>${projectName}</td><td ${titleStyle}>${titleText}</td><td>${assignee}</td><td><span class="badge ${statusClass(t.status)}">${statusLabel(t.status)}</span></td><td>${due}</td>`;
          ticketRows.appendChild(tr);
        });
      }

      async function loadTickets() {
        if (!window.DashboardDB) return;
        const cfg = window.DashboardDB.getConfig();
        const keyTail = cfg.SB_ANON_KEY ? cfg.SB_ANON_KEY.slice(-8) : '(none)';
        ticketDiag.textContent = `diag: SB_URL=${cfg.SB_URL || '(none)'} / KEY_TAIL=${keyTail}`;
        ticketStatus.textContent = 'state: loading tickets...';
        try {
          const users = await window.DashboardDB.fetchUsers();
          usersById.clear();
          users.forEach(u => usersById.set(u.id, u));

          const rows = await window.DashboardDB.fetchTickets({ limit: 300 });
          renderTickets(rows);
          ticketStatus.textContent = `state: loaded ${rows.length} tickets`;
        } catch (e) {
          ticketStatus.textContent = `state: error / ${e.message}`;
        }
      }



      loadTickets();

      (function(){
        const btn=document.getElementById('hamburgerBtn');
        const fab=document.getElementById('hamburgerFab');
        const sidebar=document.querySelector('.sidebar');
        const backdrop=document.getElementById('drawerBackdrop');
        if(!sidebar||!backdrop) return;
        function open(){sidebar.classList.add('open');backdrop.classList.add('open');}
        function close(){sidebar.classList.remove('open');backdrop.classList.remove('open');}
        if(btn) btn.addEventListener('click',()=> sidebar.classList.contains('open')?close():open());
        if(fab) fab.addEventListener('click',()=> sidebar.classList.contains('open')?close():open());
        backdrop.addEventListener('click',close);
      })();
    </script>

  </body>
</html>
