<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>minClaw 申込フォーム</title>
  <style>
    body{margin:0;background:#0f1630;color:#f5f7ff;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:720px;margin:32px auto;padding:16px}
    .card{background:#121a33;border:1px solid #22305a;border-radius:12px;padding:16px}
    .input{width:100%;padding:10px;border:1px solid #22305a;border-radius:8px;background:#0e1530;color:#fff}
    .btn{margin-top:12px;padding:10px 14px;border-radius:8px;border:1px solid #22305a;background:#1d4ed8;color:#fff}
    label{display:block;margin-top:10px}
    .sub{font-size:12px;color:#b9c4ea;margin-top:4px}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>minClaw 申込フォーム</h1>
      <p>以下3項目を入力してください（LINE案内URLのトークンで本人連携）。</p>
      <form onsubmit="event.preventDefault();alert('申込を受け付けました（デモ）');">
        <label>企業名<input class="input" required placeholder="株式会社サンプル" /></label>
        <label>申込者氏名<input class="input" required placeholder="山田 太郎" /></label>
        <div class="sub">連携済みLINE ID: Uxxxxx...xxxx（自動取得）</div>
        <label>
          サイトslug（半角英数字20文字以内）
          <input class="input" required maxlength="20" pattern="[A-Za-z0-9]{1,20}" placeholder="Acompany01" />
          <div class="sub">公開URLは /minClaw/&lt;slug&gt;/ 形式で作成されます。</div>
        </label>
        <button class="btn" type="submit">申込する</button>
      </form>
    </section>
  </main>
</body>
</html>
