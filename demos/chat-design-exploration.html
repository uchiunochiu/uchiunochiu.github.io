<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chat Design Exploration</title>
  <style>
    :root {
      --space-1: 4px;
      --space-2: 8px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;
      --bg: #efefec;
      --bg-soft: rgba(255, 255, 255, 0.6);
      --panel: rgba(248, 248, 245, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.88);
      --line: rgba(84, 88, 84, 0.11);
      --line-strong: rgba(84, 88, 84, 0.18);
      --text: #1f2421;
      --muted: #70756f;
      --shadow: 0 40px 90px -58px rgba(38, 42, 39, 0.3);
      --panel-shadow: 0 32px 80px -52px rgba(38, 42, 39, 0.24);
      --radius-panel: 36px;
      --radius-device: 28px;
      --radius-screen: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 34%),
        linear-gradient(180deg, #f6f6f3 0%, var(--bg) 52%, #ebebe8 100%);
      background-size: 40px 40px, 40px 40px, auto, auto;
      color: var(--text);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      padding: var(--space-6);
    }

    .page {
      min-height: calc(100dvh - var(--space-12));
      display: grid;
      grid-template-rows: auto 1fr;
      gap: var(--space-8);
      max-width: 1440px;
      margin: 0 auto;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-2) var(--space-1);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .topline-label,
    .topline-handle {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      white-space: nowrap;
    }

    .topline-label::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(50, 56, 51, 0.24);
      box-shadow: 0 0 0 4px rgba(50, 56, 51, 0.06);
    }

    .hero-shell {
      position: relative;
      display: grid;
      place-items: center;
      padding: var(--space-4);
    }

    .hero-panel {
      position: relative;
      width: min(100%, 1200px);
      min-height: 760px;
      border-radius: var(--radius-panel);
      padding: var(--space-10);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(244, 244, 241, 0.82)),
        var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.85),
        inset 0 -1px 0 rgba(255, 255, 255, 0.36),
        var(--panel-shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: var(--space-10);
      isolation: isolate;
    }

    .hero-panel::before,
    .hero-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hero-panel::before {
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.24));
      opacity: 0.52;
    }

    .hero-panel::after {
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.72), transparent 26%),
        radial-gradient(circle at 80% 18%, rgba(225, 228, 223, 0.6), transparent 24%),
        linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.26) 100%);
      z-index: -1;
    }

    .panel-head {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-8);
      z-index: 1;
    }

    .panel-copy {
      display: grid;
      gap: var(--space-4);
      max-width: 560px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 28px;
      padding: 0 var(--space-2);
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      color: #525852;
      background: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 72px);
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-weight: 500;
    }

    .lead {
      margin: 0;
      max-width: 38ch;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .panel-note {
      padding-top: var(--space-2);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      text-align: right;
      max-width: 220px;
    }

    .device-stage {
      position: relative;
      min-height: 0;
      display: grid;
      align-items: end;
      z-index: 1;
    }

    .device-stage::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 7%;
      height: 120px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(61, 65, 61, 0.14), transparent 68%);
      filter: blur(18px);
      opacity: 0.65;
    }

    .device-layout {
      position: relative;
      display: grid;
      grid-template-columns: minmax(260px, 0.84fr) minmax(320px, 1fr);
      gap: var(--space-8);
      align-items: end;
      width: min(100%, 980px);
      margin: 0 auto;
    }

    .device {
      position: relative;
      border-radius: var(--radius-device);
      border: 1px solid rgba(255, 255, 255, 0.92);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(236, 237, 233, 0.94));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.96),
        inset 0 -1px 0 rgba(136, 141, 136, 0.08),
        var(--shadow);
    }

    .device-left {
      width: min(100%, 348px);
      padding: 12px;
      justify-self: end;
      transform: translateX(44px) translateY(12px);
      z-index: 1;
    }

    .device-right {
      width: min(100%, 520px);
      padding: 14px;
      justify-self: start;
      z-index: 2;
    }

    .screen {
      border-radius: var(--radius-screen);
      overflow: hidden;
      border: 1px solid rgba(105, 110, 105, 0.1);
      background:
        linear-gradient(180deg, rgba(252, 252, 250, 0.96), rgba(241, 242, 238, 0.94));
      min-height: 100%;
    }

    .screen-inner {
      display: grid;
      gap: var(--space-4);
      padding: var(--space-4);
      min-height: 100%;
    }

    .toolbar,
    .mini-row,
    .thread-head,
    .chat-row,
    .dock {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .toolbar {
      min-height: 32px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .toolbar .dots,
    .icon-set {
      display: inline-flex;
      gap: 6px;
    }

    .toolbar .dots span,
    .icon-set span {
      display: block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(85, 90, 85, 0.18);
    }

    .mini-card,
    .message,
    .composer {
      border: 1px solid rgba(100, 105, 100, 0.08);
      background: var(--panel-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
    }

    .mini-card {
      display: grid;
      gap: var(--space-2);
      border-radius: 18px;
      padding: 14px;
    }

    .line,
    .pill-line {
      display: block;
      height: 8px;
      border-radius: 999px;
      background: rgba(90, 96, 91, 0.12);
    }

    .line.short { width: 38%; }
    .line.mid { width: 58%; }
    .line.long { width: 84%; }
    .line.longer { width: 92%; }
    .pill-line {
      width: 92px;
      height: 24px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(90, 96, 91, 0.08);
    }

    .mini-stack {
      display: grid;
      gap: 12px;
      padding-top: var(--space-2);
    }

    .mini-row {
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.54);
      border: 1px solid rgba(100, 105, 100, 0.08);
      min-height: 52px;
    }

    .mini-row .avatar,
    .thread-head .avatar {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(110, 116, 110, 0.2), rgba(110, 116, 110, 0.1));
    }

    .mini-copy,
    .thread-copy {
      display: grid;
      gap: 8px;
      flex: 1;
    }

    .device-left .screen {
      min-height: 520px;
    }

    .device-right .screen {
      min-height: 620px;
    }

    .thread {
      display: grid;
      gap: var(--space-4);
      min-height: 100%;
      grid-template-rows: auto auto 1fr auto;
    }

    .thread-head {
      min-height: 40px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(100, 105, 100, 0.08);
    }

    .thread-body {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .message {
      display: grid;
      gap: 10px;
      max-width: 72%;
      padding: 14px;
      border-radius: 20px;
    }

    .message.assistant {
      justify-self: start;
      border-top-left-radius: 10px;
      background: rgba(255, 255, 255, 0.7);
    }

    .message.user {
      justify-self: end;
      border-top-right-radius: 10px;
      background: rgba(231, 234, 228, 0.9);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-2);
      align-items: center;
      min-height: 60px;
      padding: 10px;
      border-radius: 20px;
    }

    .composer-field {
      height: 40px;
      border-radius: 14px;
      background: rgba(243, 244, 241, 0.95);
      border: 1px solid rgba(100, 105, 100, 0.06);
    }

    .composer-action {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: rgba(82, 88, 83, 0.14);
    }

    .dock {
      justify-content: center;
      gap: 10px;
      padding-top: var(--space-2);
    }

    .dock span {
      width: 36px;
      height: 8px;
      border-radius: 999px;
      background: rgba(85, 90, 85, 0.12);
    }

    @media (max-width: 980px) {
      body { padding: var(--space-4); }

      .hero-panel {
        min-height: auto;
        padding: var(--space-8);
      }

      .panel-head {
        grid-template-columns: 1fr;
        display: grid;
      }

      .panel-note {
        text-align: left;
        max-width: none;
      }

      .device-layout {
        grid-template-columns: 1fr;
        gap: var(--space-6);
        width: min(100%, 560px);
      }

      .device-left,
      .device-right {
        width: 100%;
        justify-self: center;
        transform: none;
      }
    }

    @media (max-width: 640px) {
      .page {
        gap: var(--space-6);
        min-height: auto;
      }

      .topline {
        font-size: 11px;
        letter-spacing: 0.05em;
      }

      .hero-shell {
        padding: 0;
      }

      .hero-panel {
        padding: var(--space-6);
        border-radius: 28px;
        gap: var(--space-8);
      }

      h1 {
        font-size: 34px;
        line-height: 1.1;
      }

      .lead {
        font-size: 14px;
      }

      .device-left .screen {
        min-height: 448px;
      }

      .device-right .screen {
        min-height: 540px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topline" aria-label="ページ見出し">
      <div class="topline-label">chat design study</div>
      <div class="topline-handle">@uchiunochiu / visual-note</div>
    </header>

    <section class="hero-shell" aria-labelledby="page-title">
      <div class="hero-panel">
        <div class="panel-head">
          <div class="panel-copy">
            <div class="eyebrow">静的ランディング検証</div>
            <h1 id="page-title">背景の密度と面の静けさで見せる、チャット画面の探索。</h1>
            <p class="lead">薄いグレーの下地に、細いグリッドと大きなラウンドパネルを重ね、装飾を削いだまま端末モックを主役に置いた一枚構成です。</p>
          </div>
          <p class="panel-note">ボタンや強い配色は使わず、余白と輪郭で全体の温度を整えています。</p>
        </div>

        <div class="device-stage">
          <div class="device-layout">
            <article class="device device-left" aria-label="一覧モック">
              <div class="screen">
                <div class="screen-inner">
                  <div class="toolbar">
                    <span>overview</span>
                    <div class="dots" aria-hidden="true">
                      <span></span>
                      <span></span>
                      <span></span>
                    </div>
                  </div>

                  <div class="mini-card">
                    <span class="pill-line"></span>
                    <span class="line long"></span>
                    <span class="line mid"></span>
                  </div>

                  <div class="mini-stack">
                    <div class="mini-row">
                      <span class="avatar" aria-hidden="true"></span>
                      <div class="mini-copy">
                        <span class="line mid"></span>
                        <span class="line short"></span>
                      </div>
                      <span class="line short"></span>
                    </div>
                    <div class="mini-row">
                      <span class="avatar" aria-hidden="true"></span>
                      <div class="mini-copy">
                        <span class="line long"></span>
                        <span class="line mid"></span>
                      </div>
                      <span class="line short"></span>
                    </div>
                    <div class="mini-row">
                      <span class="avatar" aria-hidden="true"></span>
                      <div class="mini-copy">
                        <span class="line mid"></span>
                        <span class="line short"></span>
                      </div>
                      <span class="line short"></span>
                    </div>
                    <div class="mini-row">
                      <span class="avatar" aria-hidden="true"></span>
                      <div class="mini-copy">
                        <span class="line long"></span>
                        <span class="line short"></span>
                      </div>
                      <span class="line short"></span>
                    </div>
                  </div>

                  <div class="dock" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                  </div>
                </div>
              </div>
            </article>

            <article class="device device-right" aria-label="チャットモック">
              <div class="screen">
                <div class="screen-inner thread">
                  <div class="toolbar">
                    <span>conversation</span>
                    <div class="icon-set" aria-hidden="true">
                      <span></span>
                      <span></span>
                    </div>
                  </div>

                  <div class="thread-head">
                    <span class="avatar" aria-hidden="true"></span>
                    <div class="thread-copy">
                      <span class="line short"></span>
                      <span class="line mid"></span>
                    </div>
                    <span class="line short"></span>
                  </div>

                  <div class="thread-body">
                    <div class="message assistant">
                      <span class="line longer"></span>
                      <span class="line long"></span>
                      <span class="line mid"></span>
                    </div>
                    <div class="message user">
                      <span class="line long"></span>
                      <span class="line short"></span>
                    </div>
                    <div class="message assistant">
                      <span class="line longer"></span>
                      <span class="line long"></span>
                      <span class="line long"></span>
                      <span class="line mid"></span>
                    </div>
                    <div class="message user">
                      <span class="line mid"></span>
                      <span class="line short"></span>
                    </div>
                  </div>

                  <div class="composer">
                    <div class="composer-field" aria-hidden="true"></div>
                    <div class="composer-action" aria-hidden="true"></div>
                  </div>
                </div>
              </div>
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
