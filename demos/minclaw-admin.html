<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>minClaw Admin (GitHub Pages)</title>
  <style>
    :root{--bg:#0b1020;--card:#121a33;--line:#22305a;--txt:#f5f7ff;--sub:#a8b2d1}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#081024,#0f1630);color:var(--txt);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:1120px;margin:0 auto;padding:20px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}.section{margin-top:12px}
    .grid{display:grid;gap:12px}.grid.cols-2{grid-template-columns:1fr 1fr}
    .table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px;border-bottom:1px solid #1f2c4d;text-align:left;font-size:14px}.table th{color:var(--sub)}
    .input{width:100%;padding:9px;border-radius:8px;border:1px solid var(--line);background:#0e1530;color:#e5ecff}.btn{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#1a2a58;color:#e5ecff}
    .muted{color:var(--sub);font-size:12px}
    @media(max-width:860px){.grid.cols-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1 style="margin:0 0 8px">minClaw Tenant Admin (GitHub Pages)</h1>
      <div class="muted">GitHub Pages版。Supabaseの公開キーで直接CRUDします（デモ）。</div>
      <div id="err" class="muted" style="color:#fca5a5;margin-top:8px"></div>
    </section>

    <section class="grid cols-2 section">
      <div class="card">
        <h2 style="margin:0 0 8px">Tenants</h2>
        <table class="table"><thead><tr><th>ID</th><th>企業名</th><th>Status</th><th>Plan</th></tr></thead><tbody id="tenants"></tbody></table>
      </div>
      <div class="card">
        <h2 style="margin:0 0 8px">Create Tenant</h2>
        <div class="grid">
          <input id="tenantName" class="input" placeholder="企業名"/>
          <select id="tenantPlan" class="input"><option>starter</option><option>growth</option><option>pro</option></select>
          <button id="createBtn" class="btn">Create</button>
        </div>
      </div>
    </section>

    <section class="grid cols-2 section">
      <div class="card">
        <h2 style="margin:0 0 8px">Activate Tenant (LINE)</h2>
        <div class="grid">
          <input id="lineUserId" class="input" placeholder="line_user_id"/>
          <input id="tenantId" class="input" placeholder="tenant_id"/>
          <button id="activateBtn" class="btn">Activate</button>
        </div>
      </div>
      <div class="card">
        <h2 style="margin:0 0 8px">LINE Identities</h2>
        <table class="table"><thead><tr><th>line_user_id</th><th>tenant_id</th><th>state</th></tr></thead><tbody id="identities"></tbody></table>
      </div>
    </section>

    <section class="grid cols-2 section">
      <div class="card">
        <h2 style="margin:0 0 8px">Members</h2>
        <table class="table"><thead><tr><th>tenant_id</th><th>user_id</th><th>role</th></tr></thead><tbody id="members"></tbody></table>
      </div>
      <div class="card">
        <h2 style="margin:0 0 8px">Audit Logs</h2>
        <table class="table"><thead><tr><th>time</th><th>tenant</th><th>action</th><th>result</th></tr></thead><tbody id="audits"></tbody></table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://kzixjgzqyujqyjwvdgkn.supabase.co';
    const SUPABASE_ANON='sb_publishable_ZpX-YNB5Av3mtNiIablq3w_JOPXMVxK';
    const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
    const $=id=>document.getElementById(id);
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function row(cells){return `<tr>${cells.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`}

    async function load(){
      $('err').textContent='';
      const [t,li,m,a]=await Promise.all([
        sb.from('tenants').select('*').order('created_at',{ascending:false}),
        sb.from('line_identities').select('*').order('created_at',{ascending:false}),
        sb.from('members').select('*').order('created_at',{ascending:false}),
        sb.from('audit_logs').select('*').order('created_at',{ascending:false}).limit(30),
      ]);
      const e=t.error||li.error||m.error||a.error; if(e){$('err').textContent=e.message; return;}
      $('tenants').innerHTML=(t.data||[]).map(x=>row([x.id,x.name,x.status,x.plan])).join('')||'<tr><td colspan="4">-</td></tr>';
      $('identities').innerHTML=(li.data||[]).map(x=>row([x.line_user_id,x.tenant_id,x.state])).join('')||'<tr><td colspan="3">-</td></tr>';
      $('members').innerHTML=(m.data||[]).map(x=>row([x.tenant_id,x.user_id,x.role])).join('')||'<tr><td colspan="3">-</td></tr>';
      $('audits').innerHTML=(a.data||[]).map(x=>row([String(x.created_at||'').slice(0,16),x.tenant_id,x.action,x.result])).join('')||'<tr><td colspan="4">-</td></tr>';
    }

    $('createBtn').onclick=async()=>{
      const name=$('tenantName').value.trim(); if(!name)return;
      const id='tnt_'+Math.random().toString(36).slice(2,8);
      const plan=$('tenantPlan').value;
      const r=await sb.from('tenants').insert({id,name,plan,status:'pending'});
      if(r.error){$('err').textContent=r.error.message;return;}
      $('tenantName').value=''; await load();
    };

    $('activateBtn').onclick=async()=>{
      const line_user_id=$('lineUserId').value.trim(), tenant_id=$('tenantId').value.trim(); if(!line_user_id||!tenant_id)return;
      const u=await sb.from('line_identities').upsert({line_user_id,tenant_id,state:'active',activated_at:new Date().toISOString()});
      if(u.error){$('err').textContent=u.error.message;return;}
      await sb.from('tenants').update({status:'active'}).eq('id',tenant_id);
      await sb.from('audit_logs').insert({tenant_id,actor:'admin-ui',action:'tenant.activate',result:'ok',meta:{line_user_id}});
      $('lineUserId').value=''; $('tenantId').value=''; await load();
    };

    load();
  </script>
</body>
</html>
