<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Project | Tachikoma Dashboard</title>
    <style>
      :root { --bg:#0a0a0a; --card:#111; --muted:#1c1c1c; --border:#2a2a2a; --text:#fafafa; --subtle:#a1a1aa; --radius:12px; }
      *{box-sizing:border-box}
      body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text)}
      .app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}
      .sidebar{border-right:1px solid var(--border);padding:20px 14px}
      .brand{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);margin-bottom:18px;font-weight:700}
      .menu{display:grid;gap:6px}
      .menu a{color:var(--text);text-decoration:none;padding:10px 12px;border-radius:10px;font-size:14px;display:flex;align-items:center;gap:8px;white-space:nowrap}
      .menu a.active{background:var(--card);border:1px solid var(--border)}
      .main{padding:24px}
      .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
      .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      label{display:block;font-size:12px;color:var(--subtle)}
      input,select,textarea{width:100%;margin-top:6px;background:#0f0f0f;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;font:inherit}
      textarea{min-height:120px}
      .full{grid-column:1/-1}
      .btn{background:#fafafa;color:#111;padding:9px 12px;border-radius:10px;border:0;font-weight:700;cursor:pointer}
      .muted{font-size:12px;color:var(--subtle)}
      .actions{display:flex;gap:10px;align-items:center;margin-top:12px}
      @media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border)}.grid{grid-template-columns:1fr}.main{padding:12px}}
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">dashboard</div>
        <nav class="menu">
          <a href="/">🏠 Dashboard</a>
          <a class="active" href="/projects.html">📁 Projects</a>
          <a href="/tickets.html">🎫 Tickets</a>
          <a href="/board.html">🧩 Board</a>
          <a href="/research-reports.html">📊 ResearchReport</a>
          <a href="/design-system.html">🎨 DesighSystem</a>
          <a href="#">🗓️ Calendar</a>
          <a href="#">⚙️ Settings</a>
        </nav>
      </aside>

      <main class="main">
        <div class="head">
          <div>
            <h1 style="margin:0">+ New Project</h1>
            <div class="muted">プロジェクト新規作成</div>
          </div>
          <a href="/projects.html" class="muted">← Back</a>
        </div>

        <section class="card">
          <div class="grid">
            <label>Project Key
              <input id="project_key" placeholder="PRJ-101" />
            </label>

            <label>Title
              <input id="title" placeholder="Project title" />
            </label>

            <label>Status
              <select id="status">
                <option value="planning">planning</option>
                <option value="in_progress">in_progress</option>
                <option value="blocked">blocked</option>
                <option value="review">review</option>
              </select>
            </label>

            <label>Due Date
              <input id="due_date" type="date" />
            </label>

            <label class="full">Description
              <textarea id="description" placeholder="project description"></textarea>
            </label>

            <label class="full">目的（Goal）
              <textarea id="goal" placeholder="このプロジェクトで達成すること"></textarea>
            </label>

            <label class="full">完了条件（Definition of Done）※1行1項目
              <textarea id="definition_of_done" placeholder="例: Project詳細で必要情報を1画面で把握できる"></textarea>
            </label>

            <label class="full">制約（Constraints / Guardrails）※1行1項目
              <textarea id="constraints" placeholder="例: Owner概念なし / YYYY/MM/DD形式"></textarea>
            </label>

            <div class="full" style="border:1px solid var(--border);border-radius:10px;padding:10px;background:#0d0d0d">
              <div style="font-size:12px;color:var(--subtle);margin-bottom:8px">PMスキル初期テンプレ（プロジェクト単位）</div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                <select id="pm_template" style="max-width:320px">
                  <option value="">テンプレを選択…</option>
                  <option value="discover_strategy">Discover + Strategy（新規企画向け）</option>
                  <option value="execution_focus">Execution Focus（実装推進向け）</option>
                  <option value="growth_focus">Growth Focus（運用改善向け）</option>
                </select>
                <button id="apply_pm_template" type="button" class="btn" style="padding:8px 10px">Apply PM Template</button>
              </div>
            </div>

            <div class="full" style="border:1px solid var(--border);border-radius:10px;padding:10px;background:#0d0d0d">
              <div style="font-size:12px;color:var(--subtle);margin-bottom:8px">PM Outputs（Discovery）</div>
              <div class="grid" style="grid-template-columns:1fr 1fr">
                <label>課題定義<textarea id="pm_problem_definition" placeholder="何が課題か"></textarea></label>
                <label>対象顧客<textarea id="pm_target_customer" placeholder="誰の課題か"></textarea></label>
                <label>JTBD<textarea id="pm_jtbd" placeholder="どんな状況で何を達成したいか"></textarea></label>
                <label>代替手段<textarea id="pm_alternatives" placeholder="現状の代替行動/代替サービス"></textarea></label>
                <label>仮説一覧<textarea id="pm_hypotheses" placeholder="主要仮説を列挙"></textarea></label>
                <label>根拠データ<textarea id="pm_evidence" placeholder="データ/観察/一次情報"></textarea></label>
                <label class="full">課題優先度<textarea id="pm_problem_priority" placeholder="優先順位と理由"></textarea></label>
              </div>
            </div>

            <div class="full" style="border:1px solid var(--border);border-radius:10px;padding:10px;background:#0d0d0d">
              <div style="font-size:12px;color:var(--subtle);margin-bottom:8px">PM Outputs（Strategy〜Growth）</div>
              <div class="grid" style="grid-template-columns:1fr 1fr">
                <label>価値提案<textarea id="pm_value_proposition" placeholder="提供価値の定義"></textarea></label>
                <label>ポジショニング<textarea id="pm_positioning" placeholder="競合に対する立ち位置"></textarea></label>
                <label>MVP範囲<textarea id="pm_mvp_scope" placeholder="最初に作る範囲"></textarea></label>
                <label>KPIツリー<textarea id="pm_kpi_tree" placeholder="主要KPIと分解"></textarea></label>
                <label>North Star<textarea id="pm_north_star" placeholder="北極星指標"></textarea></label>
                <label>実行ロードマップ<textarea id="pm_execution_roadmap" placeholder="実行順とマイルストーン"></textarea></label>
                <label class="full">GTM計画<textarea id="pm_gtm_plan" placeholder="ローンチ/獲得/運用計画"></textarea></label>
              </div>
            </div>

            <div class="full" style="border:1px solid var(--border);border-radius:10px;padding:10px;background:#0d0d0d">
              <div style="font-size:12px;color:var(--subtle);margin-bottom:8px">PM Outputs（Research / Promotion）</div>
              <div class="grid" style="grid-template-columns:1fr 1fr">
                <label>ディープリサーチ要約（短文）<textarea id="pm_deep_research" placeholder="結論を1〜3行で要約"></textarea></label>
                <label>リサーチPDF URL<textarea id="pm_research_report_url" placeholder="https://drive.google.com/file/d/.../view"></textarea></label>
                <label class="full">リサーチ出典URL（1行1件）<textarea id="pm_research_sources" placeholder="https://example.com/source-1\nhttps://example.com/source-2"></textarea></label>
                <label>競合分析<textarea id="pm_competitor_analysis" placeholder="主要競合と差別化ポイント"></textarea></label>
                <label>プロモーション戦略<textarea id="pm_promotion_strategy" placeholder="訴求軸・オファー・導線"></textarea></label>
                <label class="full">有効媒体（チャネル）<textarea id="pm_promotion_media" placeholder="媒体候補と優先順位"></textarea></label>
              </div>
            </div>

            <label class="full">参照リンク（カテゴリ管理）※label|url 形式 / 1行1件
              <textarea id="links" placeholder="Design Docs|https://example.com/docs"></textarea>
            </label>

            <label class="full">Repository URL
              <input id="repo_url" placeholder="https://github.com/owner/repo" />
            </label>

            <label>Default Branch
              <input id="default_branch" placeholder="main" value="main" />
            </label>
          </div>

          <div class="actions">
            <button id="createBtn" class="btn">Create Project</button>
            <span id="state" class="muted">state: idle</span>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/dashboard-db.js"></script>
    <script>
      const state=document.getElementById('state');
      function parseLines(text){
        return (text || '').split('\n').map(s => s.trim()).filter(Boolean);
      }

      function parseLinks(text){
        return parseLines(text).map((line) => {
          const [label, url] = line.split('|').map((s) => (s || '').trim());
          return { label: label || url || line, url: url || '' };
        });
      }

      function collectPmOutputs(){
        const map = {
          problem_definition: document.getElementById('pm_problem_definition').value.trim(),
          target_customer: document.getElementById('pm_target_customer').value.trim(),
          jtbd: document.getElementById('pm_jtbd').value.trim(),
          alternatives: document.getElementById('pm_alternatives').value.trim(),
          hypotheses: document.getElementById('pm_hypotheses').value.trim(),
          evidence: document.getElementById('pm_evidence').value.trim(),
          problem_priority: document.getElementById('pm_problem_priority').value.trim(),
          value_proposition: document.getElementById('pm_value_proposition').value.trim(),
          positioning: document.getElementById('pm_positioning').value.trim(),
          mvp_scope: document.getElementById('pm_mvp_scope').value.trim(),
          kpi_tree: document.getElementById('pm_kpi_tree').value.trim(),
          north_star: document.getElementById('pm_north_star').value.trim(),
          execution_roadmap: document.getElementById('pm_execution_roadmap').value.trim(),
          gtm_plan: document.getElementById('pm_gtm_plan').value.trim(),
          deep_research: document.getElementById('pm_deep_research').value.trim(),
          research_report_url: document.getElementById('pm_research_report_url').value.trim(),
          research_sources: document.getElementById('pm_research_sources').value.trim(),
          competitor_analysis: document.getElementById('pm_competitor_analysis').value.trim(),
          promotion_strategy: document.getElementById('pm_promotion_strategy').value.trim(),
          promotion_media: document.getElementById('pm_promotion_media').value.trim(),
        };
        return map;
      }

      function buildLinksWithPm(baseLinks){
        const normal = (Array.isArray(baseLinks) ? baseLinks : []).filter((x) => !String(x?.label || '').startsWith('pm:'));
        const pm = collectPmOutputs();
        const pmLinks = Object.entries(pm)
          .filter(([, v]) => v)
          .map(([k, v]) => ({ label: `pm:${k}`, url: v }));
        return [...normal, ...pmLinks];
      }

      function applyPmTemplate(kind){
        const goalEl = document.getElementById('goal');
        const dodEl = document.getElementById('definition_of_done');
        const constraintsEl = document.getElementById('constraints');
        const descEl = document.getElementById('description');
        if(kind === 'discover_strategy'){
          if(!descEl.value.trim()) descEl.value = '新規プロダクトの課題発見→戦略仮説→実行計画までを一気通しで定義する。';
          goalEl.value = 'PMスキルを使って Discover→Strategy→PRD方針 を確定し、実行チケットへ分解できる状態にする。';
          dodEl.value = ['対象顧客と課題仮説を明文化','優先度（Impact×Risk）を確定','MVP範囲とKPIを確定','実行チケットを起票'].join('\n');
          constraintsEl.value = ['新規仮説の乱造は禁止（既存仮説の更新優先）','KPI未定義の施策は実行しない','毎週レビューは実験結果ベースで実施'].join('\n');
          document.getElementById('pm_problem_definition').value = '解くべき課題を1文で定義';
          document.getElementById('pm_target_customer').value = '主要顧客セグメント';
          document.getElementById('pm_jtbd').value = 'When..., I want to..., so I can...';
          document.getElementById('pm_hypotheses').value = '仮説A\n仮説B\n仮説C';
          document.getElementById('pm_problem_priority').value = 'Impact×Riskで優先順位を記載';
          document.getElementById('pm_value_proposition').value = '提供価値の一文';
          document.getElementById('pm_mvp_scope').value = 'MVPで必須の機能範囲';
          document.getElementById('pm_kpi_tree').value = 'North Star -> Input KPI';
          document.getElementById('pm_north_star').value = '主要北極星指標';
          document.getElementById('pm_deep_research').value = '市場・顧客・競合の一次情報を収集し、示唆を要約';
          document.getElementById('pm_research_report_url').value = 'https://drive.google.com/file/d/REPORT_ID/view';
          document.getElementById('pm_research_sources').value = 'https://example.com/source-1\nhttps://example.com/source-2';
          document.getElementById('pm_competitor_analysis').value = '競合A/B/Cの強み・弱み・価格・導線比較';
          document.getElementById('pm_promotion_strategy').value = '訴求メッセージ・オファー・導入導線を設計';
          document.getElementById('pm_promotion_media').value = '優先媒体: LINE/Instagram/Googleビジネスプロフィール';
        } else if(kind === 'execution_focus'){
          if(!descEl.value.trim()) descEl.value = '確定済み戦略を実装可能な仕様とタスクへ落とし込み、短サイクルで実行する。';
          goalEl.value = '仕様の曖昧さを排除し、実装とレビューが止まらない運用を作る。';
          dodEl.value = ['design/specificationが全チケットに記入済み','優先度順で着手可能','reviewまでの平均リードタイムを短縮'].join('\n');
          constraintsEl.value = ['仕様未確定のままin_progress禁止','blocked理由は必ずコメント記録','Done前に検証ログ必須'].join('\n');
          document.getElementById('pm_execution_roadmap').value = 'W1:基盤 / W2:実装 / W3:検証';
          document.getElementById('pm_gtm_plan').value = 'リリース前後の告知/導入導線';
          document.getElementById('pm_competitor_analysis').value = '競合比較から実装優先度を再整理';
          document.getElementById('pm_research_report_url').value = 'https://drive.google.com/file/d/REPORT_ID/view';
          document.getElementById('pm_research_sources').value = 'https://example.com/competitor-1\nhttps://example.com/competitor-2';
          document.getElementById('pm_promotion_strategy').value = 'ローンチ前後の訴求とオンボードを整備';
          document.getElementById('pm_promotion_media').value = '媒体別の実行順（Owned→Earned→Paid）を定義';
        } else if(kind === 'growth_focus'){
          if(!descEl.value.trim()) descEl.value = '運用データから改善仮説を更新し、継続率と成果指標を改善する。';
          goalEl.value = 'KPIに基づく改善サイクルを固定化し、継続率・工数削減を向上させる。';
          dodEl.value = ['週次KPIレポートが自動で確認可能','改善施策のAB結果を記録','翌週の優先施策を1つに決定'].join('\n');
          constraintsEl.value = ['KPI計測不能な施策は除外','改善案は最大3件に絞る','同時に走らせる実験は2件まで'].join('\n');
          document.getElementById('pm_kpi_tree').value = 'North Star -> 活性化率/継続率/収益';
          document.getElementById('pm_north_star').value = '継続利用企業数';
          document.getElementById('pm_execution_roadmap').value = '月次改善サイクル計画';
          document.getElementById('pm_gtm_plan').value = '再来店/CRM/紹介導線の最適化';
          document.getElementById('pm_deep_research').value = 'KPI悪化要因を外部・内部データで深掘り';
          document.getElementById('pm_research_report_url').value = 'https://drive.google.com/file/d/REPORT_ID/view';
          document.getElementById('pm_research_sources').value = 'https://example.com/insight-1\nhttps://example.com/insight-2';
          document.getElementById('pm_competitor_analysis').value = '競合の施策変化と差分を定点観測';
          document.getElementById('pm_promotion_strategy').value = '継続率改善に効く訴求と接点を更新';
          document.getElementById('pm_promotion_media').value = '既存顧客接点を優先して媒体最適化';
        }
      }

      document.getElementById('apply_pm_template').onclick = () => {
        const kind = document.getElementById('pm_template').value;
        if(!kind){ state.textContent = 'state: pm template not selected'; return; }
        applyPmTemplate(kind);
        state.textContent = 'state: pm template applied';
      };

      document.getElementById('createBtn').onclick=async()=>{
        const projectKey=document.getElementById('project_key').value.trim();
        const title=document.getElementById('title').value.trim();
        const status=document.getElementById('status').value;
        const dueDate=document.getElementById('due_date').value || null;
        const description=document.getElementById('description').value.trim() || null;
        const goal=document.getElementById('goal').value.trim();
        const definitionOfDone=parseLines(document.getElementById('definition_of_done').value);
        const constraints=parseLines(document.getElementById('constraints').value);
        const links=buildLinksWithPm(parseLinks(document.getElementById('links').value));
        const repoUrl=document.getElementById('repo_url').value.trim() || null;
        const defaultBranch=document.getElementById('default_branch').value.trim() || null;
        if(!title){state.textContent='state: title required';return;}
        state.textContent='state: creating...';
        try{
          const p=await window.DashboardDB.createProject({projectKey,title,description,status,dueDate,goal,definitionOfDone,constraints,links,repoUrl,defaultBranch,createdBy:null});
          if(p?.id) localStorage.setItem('LAST_PROJECT_ID', p.id);
          location.href='/projects.html';
        }catch(e){state.textContent=`state: error / ${e.message}`;}
      };
    </script>
  </body>
</html>
